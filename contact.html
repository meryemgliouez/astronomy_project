<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - AstroPassion</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">   <!-- Lien vers la bibliothèque CSS de Bootstrap -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">AstroPassion</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="astronomie.html">Accueil</a></li>
                    <li class="nav-item"><a class="nav-link" href="decouverte.html">Découverte</a></li>
                    <li class="nav-item"><a class="nav-link" href="evenements.html">Événements</a></li>
                    <li class="nav-item"><a class="nav-link" href="observation.html">Observation</a></li>
                    <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>
    

    <!-- Bannière -->
    <header class="hero text-center text-white">
        <div class="container">
            <h1 class="display-4">Contactez-nous</h1>
            <p class="lead">Nous sommes là pour répondre à vos questions et vous guider dans votre aventure spatiale.</p>
        </div>
    </header>

    <!-- Formulaire de Contact -->
    <section class="container my-5">
        <h2 class="text-center">Formulaire de Contact</h2>
        <form action="#" method="post">
            <div class="mb-3">
                <label for="nom" class="form-label">Votre Nom</label>
                <input type="text" class="form-control" id="nom" required><!-- Champ texte pour le nom -->
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Votre Email</label>
                <input type="email" class="form-control" id="email" required>
            </div>
            <div class="mb-3">
                <label for="sujet" class="form-label">Sujet</label>
                <input type="text" class="form-control" id="sujet" required>
            </div>
            <div class="mb-3">
                <label for="message" class="form-label">Message</label>
                <textarea class="form-control" id="message" rows="5" required></textarea><!-- Zone de texte pour le message -->
            </div>
            <button type="submit" class="btn btn-primary">Envoyer</button> <!-- Bouton pour envoyer le formulaire -->
        </form>
    </section>

    <!-- Pied de page -->
    <footer class="bg-dark text-white text-center py-3">
        <p>&copy; 2025 AstroPassion - Tous droits réservés</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>  <!-- Script Bootstrap pour activer les composants interactifs comme le menu responsive -->
</body>
</html>
